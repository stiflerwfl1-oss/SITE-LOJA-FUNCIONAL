<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TECH 7 - Checkout</title>
    <link rel="icon" href="/logo.png" />
    <style>
      :root {
        --bg: #0b0b0b;
        --panel: #121212;
        --muted: #a3a3a3;
        --text: #ffffff;
        --line: #2a2a2a;
        --accent: #ff6a00;
        --accent2: #e65f00;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(1100px 680px at 0% -10%, rgba(255,106,0,.24), transparent 60%),
                    radial-gradient(900px 700px at 100% 0%, rgba(255,106,0,.14), transparent 55%),
                    var(--bg);
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 4;
        backdrop-filter: blur(10px);
        background: rgba(0, 0, 0, .74);
        border-bottom: 1px solid rgba(255,255,255,.08);
      }
      .container { max-width: 1060px; margin: 0 auto; padding: 16px; }
      .brand { display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit; }
      .brand img { width: 36px; height: 36px; border-radius: 8px; }
      .brand .title { font-weight: 800; }
      .brand .sub { color: var(--muted); font-size: 12px; }
      .grid { display:grid; grid-template-columns: 1fr 360px; gap:16px; padding: 18px 16px 42px; }
      @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }
      .card {
        background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 12px;
        overflow: hidden;
      }
      .card h2 {
        margin: 0;
        padding: 14px 16px;
        font-size: 14px;
        border-bottom: 1px solid rgba(255,255,255,.08);
      }
      .items { padding: 12px; }
      .row {
        display: grid;
        grid-template-columns: 54px 1fr auto;
        gap: 12px;
        border: 1px solid rgba(255,255,255,.09);
        background: rgba(0,0,0,.28);
        border-radius: 10px;
        padding: 12px;
      }
      .row + .row { margin-top: 10px; }
      .thumb { width:54px; height:54px; border-radius:9px; overflow:hidden; background: rgba(255,255,255,.06); }
      .thumb img { width:100%; height:100%; object-fit:cover; }
      .name { font-size:14px; font-weight:700; }
      .meta { margin-top:3px; font-size:12px; color:var(--muted); }
      .price { font-weight: 800; }
      .qty { color: var(--muted); font-size: 12px; margin-top: 4px; text-align: right; }
      .summary { padding: 14px 16px; display:grid; gap: 10px; }
      .line { display:flex; align-items:center; justify-content:space-between; font-size:13px; }
      .muted { color: var(--muted); }
      .total { font-size:16px; font-weight:900; }
      .btn {
        width: 100%;
        border: 0;
        cursor: pointer;
        border-radius: 12px;
        padding: 12px 14px;
        font-weight: 800;
        color: #fff;
        background: linear-gradient(180deg, var(--accent), var(--accent2));
      }
      .btn:disabled { opacity: .6; cursor: not-allowed; }
      .btn.secondary {
        background: transparent;
        border: 1px solid rgba(255,255,255,.14);
      }
      .empty, .alert {
        margin: 12px;
        padding: 12px;
        border-radius: 10px;
        font-size: 13px;
      }
      .empty {
        color: var(--muted);
        border: 1px dashed rgba(255,255,255,.2);
      }
      .alert {
        color: #ffd8c3;
        border: 1px solid rgba(255,106,0,.45);
        background: rgba(255,106,0,.12);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="container">
        <a class="brand" href="/index.html">
          <img src="/logo.png" alt="TECH 7" />
          <div>
            <div class="title">TECH 7</div>
            <div class="sub">Checkout</div>
          </div>
        </a>
      </div>
    </div>

    <div class="container">
      <div class="grid">
        <div class="card">
          <h2>Revisao do pedido</h2>
          <div id="alert" class="alert" style="display:none"></div>
          <div id="items" class="items"></div>
          <div id="empty" class="empty" style="display:none">Seu carrinho esta vazio.</div>
        </div>
        <div class="card">
          <h2>Pagamento</h2>
          <div class="summary">
            <div class="line"><span class="muted">Subtotal</span><span id="subtotal">R$ 0,00</span></div>
            <div class="line"><span class="muted">Frete</span><span class="muted">Calculado no Mercado Pago</span></div>
            <div class="line total"><span>Total</span><span id="total">R$ 0,00</span></div>
            <button id="payBtn" class="btn" disabled>Pagar com Mercado Pago</button>
            <a href="/carrinho/index.html"><button class="btn secondary">Voltar ao carrinho</button></a>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./checkout.js"></script>
  </body>
</html>
