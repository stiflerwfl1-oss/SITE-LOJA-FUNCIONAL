<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TECH 7 - Pagamento nao concluido</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#0b0b0b; color:#fff; }
      .c { max-width: 860px; margin: 0 auto; padding: 28px 16px; }
      a { color:#ff6a00; text-decoration:none; }
      .card { border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:16px; background: rgba(255,255,255,.03); }
      .t { font-weight: 900; font-size: 18px; }
      .m { color: rgba(255,255,255,.72); margin-top: 6px; }
      .row { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
      .pill { font-size:12px; border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:6px 10px; background: rgba(255,255,255,.04); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .err { color:#ffb4a6; }
    </style>
  </head>
  <body>
    <div class="c">
      <div class="card">
        <div class="t">Pagamento nao concluido</div>
        <div class="m" id="msg">Voce pode tentar novamente pelo carrinho.</div>
        <div class="row" id="meta" style="display:none">
          <div class="pill">Pedido: <span class="mono" id="orderId"></span></div>
          <div class="pill">Status: <span class="mono" id="status"></span></div>
          <div class="pill">Total: <span class="mono" id="total"></span></div>
        </div>
        <div class="m" style="margin-top:10px">
          <a href="/carrinho/index.html">Ir para o carrinho</a>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(location.search || "");
        var order = params.get("order") || "";
        if (!order) return;

        var msg = document.getElementById("msg");
        var meta = document.getElementById("meta");
        var elOrder = document.getElementById("orderId");
        var elStatus = document.getElementById("status");
        var elTotal = document.getElementById("total");

        function fmtCents(v) {
          var n = Number(v || 0);
          if (!isFinite(n)) n = 0;
          return (n / 100).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
        }

        fetch("/api/orders/" + encodeURIComponent(order))
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (out) {
            if (!out.ok) return;
            elOrder.textContent = out.j.id || order;
            elStatus.textContent = out.j.status || "unknown";
            elTotal.textContent = fmtCents(out.j.total_cents);
            meta.style.display = "";
            msg.textContent = "Pagamento nao concluido. Status atual do pedido: " + String(out.j.status || "unknown") + ".";
          })
          .catch(function () {
            msg.classList.add("err");
          });
      })();
    </script>
  </body>
</html>
